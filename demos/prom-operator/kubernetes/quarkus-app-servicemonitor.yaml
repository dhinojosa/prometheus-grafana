apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: quarkus-app
  namespace: prometheus
  labels:
    app: quarkus-app
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - coffee
  selector:
    matchLabels:
      app: quarkus-app
  endpoints:
    - port: http
      path: /q/metrics
      interval: 15s
