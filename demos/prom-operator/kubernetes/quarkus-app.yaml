apiVersion: apps/v1
kind: Deployment
metadata:
  name: quarkus-app
  namespace: coffee
  labels:
    app: quarkus-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quarkus-app
  template:
    metadata:
      labels:
        app: quarkus-app
    spec:
      containers:
        - name: quarkus-app
          image: dhinojosa/prometheus-quarkus-app:latest
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: quarkus-app-config
          readinessProbe:
            httpGet:
              path: /q/metrics
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/metrics
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: quarkus-app
  namespace: coffee
  labels:
    app: quarkus-app
spec:
  selector:
    app: quarkus-app
  ports:
    - name: http
      port: 8081
      targetPort: http
