quarkus.http.port=8081

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=coffee
quarkus.datasource.password=coffee
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/coffee

quarkus.hibernate-orm.database.generation=update

quarkus.jackson.write-dates-as-timestamps=false

# Fraction (0.0-1.0) of POST /orders requests that fail with 500, for canary demo chaos testing
chaos.error-rate=${CHAOS_ERROR_RATE:0.0}

# Container image (built with Jib, pushed as dhinojosa/prometheus-quarkus-app)
quarkus.container-image.builder=jib
quarkus.container-image.group=dhinojosa
quarkus.container-image.name=prometheus-quarkus-app
quarkus.container-image.tag=${quarkus.application.version}
quarkus.container-image.additional-tags=latest
quarkus.jib.platforms=linux/amd64,linux/arm64
